[project]
name = "autonoma"
version = "0.1.0"
description = "Self-organizing autonomous agent swarm with animated terminal UI"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.92.0",
    "openai>=1.0.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "rich>=13.9.0",
    "click>=8.1.0",
    "aiofiles>=24.1.0",
    "fastapi>=0.135.3",
    "uvicorn>=0.44.0",
    "websockets>=16.0",
    "sqlalchemy>=2.0.30",
    "aiosqlite>=0.20.0",
    "greenlet>=3.0",
]

[project.scripts]
autonoma = "autonoma.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autonoma"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
]
