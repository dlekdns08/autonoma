name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      # The previous deploy mounted ./output as a bind volume, so agent-written
      # files are owned by root on the host and block actions/checkout cleanup.
      # Use docker to remove them (it has the privileges we lack) before checkout.
      - name: Purge stale root-owned output/ from workspace
        run: |
          if [ -e output ]; then
            docker run --rm -v "$PWD:/ws" alpine sh -c 'rm -rf /ws/output'
          fi

      - uses: actions/checkout@v4

      - name: Fix Docker credential config
        run: |
          mkdir -p ~/.docker
          echo '{}' > ~/.docker/config.json

      - name: Create .env file
        env:
          AUTONOMA_ADMIN_PASSWORD: ${{ secrets.AUTONOMA_ADMIN_PASSWORD }}
          AUTONOMA_SESSION_SECRET: ${{ secrets.AUTONOMA_SESSION_SECRET }}
          AUTONOMA_CORS_ALLOW_ORIGINS: ${{ secrets.AUTONOMA_CORS_ALLOW_ORIGINS || 'https://autonoma.letskoala.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTONOMA_PROVIDER: ${{ secrets.AUTONOMA_PROVIDER || 'anthropic' }}
          AUTONOMA_MODEL: ${{ secrets.AUTONOMA_MODEL || 'claude-sonnet-4-6' }}
          AUTONOMA_VLLM_BASE_URL: ${{ secrets.AUTONOMA_VLLM_BASE_URL }}
          AUTONOMA_VLLM_API_KEY: ${{ secrets.AUTONOMA_VLLM_API_KEY }}
          # Now safe to read from secrets: ``config.py`` enforces
          # ``Literal["omnivoice", "vibevoice", "none"]`` on
          # ``tts_provider``, so a stale ``azure``-era secret would
          # crash with a clear pydantic ValidationError at startup
          # (the operator notices), not a silent KeepAlive loop.
          # Default ``omnivoice`` keeps existing deploys unchanged
          # when no secret is set; flip to ``vibevoice`` by setting
          # the GitHub secret with that value.
          AUTONOMA_TTS_ENABLED: ${{ secrets.AUTONOMA_TTS_ENABLED || 'true' }}
          AUTONOMA_TTS_PROVIDER: ${{ secrets.AUTONOMA_TTS_PROVIDER || 'omnivoice' }}
          # HF_TOKEN gates the Cohere ASR model used by /api/voice/*.
          # transformers/huggingface_hub auto-detect both names so we
          # set both for safety. Empty when the secret isn't configured
          # — the ASR provider then errors with a clear 401 the first
          # time someone holds push-to-talk, leaving everything else
          # (TTS, dashboard) functional.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # ASR provider is now a secret-with-fallback because the
          # vibevoice TTS rollout pulls transformers ~4.51, which is
          # incompatible with Cohere ASR's transformers-5 dependency.
          # Default 'none' so a fresh deploy stays silent (no broken
          # mic UI, no model download). Set the secret to 'cohere'
          # only when the venv is on transformers 5.x and ASR is
          # actually wanted.
          AUTONOMA_VOICE_ASR_PROVIDER: ${{ secrets.AUTONOMA_VOICE_ASR_PROVIDER || 'none' }}
          AUTONOMA_VOICE_ASR_DEFAULT_LANGUAGE: 'ko'
        run: |
          printf 'AUTONOMA_ADMIN_PASSWORD=%s\n'      "$AUTONOMA_ADMIN_PASSWORD"      >> .env
          printf 'AUTONOMA_SESSION_SECRET=%s\n'      "$AUTONOMA_SESSION_SECRET"      >> .env
          printf 'AUTONOMA_CORS_ALLOW_ORIGINS=%s\n'  "$AUTONOMA_CORS_ALLOW_ORIGINS"  >> .env
          printf 'ANTHROPIC_API_KEY=%s\n'            "$ANTHROPIC_API_KEY"            >> .env
          printf 'OPENAI_API_KEY=%s\n'               "$OPENAI_API_KEY"               >> .env
          printf 'AUTONOMA_PROVIDER=%s\n'            "$AUTONOMA_PROVIDER"            >> .env
          printf 'AUTONOMA_MODEL=%s\n'               "$AUTONOMA_MODEL"               >> .env
          printf 'AUTONOMA_VLLM_BASE_URL=%s\n'       "$AUTONOMA_VLLM_BASE_URL"       >> .env
          printf 'AUTONOMA_VLLM_API_KEY=%s\n'        "$AUTONOMA_VLLM_API_KEY"        >> .env
          printf 'AUTONOMA_TTS_ENABLED=%s\n'         "$AUTONOMA_TTS_ENABLED"         >> .env
          printf 'AUTONOMA_TTS_PROVIDER=%s\n'        "$AUTONOMA_TTS_PROVIDER"        >> .env
          printf 'HF_TOKEN=%s\n'                     "$HF_TOKEN"                     >> .env
          printf 'HUGGING_FACE_HUB_TOKEN=%s\n'       "$HF_TOKEN"                     >> .env
          printf 'AUTONOMA_VOICE_ASR_PROVIDER=%s\n'  "$AUTONOMA_VOICE_ASR_PROVIDER"  >> .env
          printf 'AUTONOMA_VOICE_ASR_DEFAULT_LANGUAGE=%s\n' "$AUTONOMA_VOICE_ASR_DEFAULT_LANGUAGE" >> .env

      # ── Native-mac API (MPS) ─────────────────────────────────────
      # Runs uvicorn on the host so PyTorch can target Metal; Docker
      # Desktop on macOS doesn't expose MPS to containers. The api
      # service in docker-compose.yml is profile-gated so this plain
      # ``up`` below only brings up the web container.
      #
      # Deploy strategy — the server does NOT run from this CI
      # workspace. Every ``actions/checkout`` runs ``git clean -ffdx``
      # which wipes ``.venv/`` out from under the live uvicorn worker,
      # producing sporadic ``ModuleNotFoundError: No module named
      # 'librosa.core'`` (and similar lazy-loader failures) whenever a
      # /tts request lands during the deploy window. To avoid that,
      # the live server is pinned to ``$HOME/autonoma-prod/`` — a
      # stable directory CI never wipes — and we promote the freshly
      # checked-out source into it via rsync below. The CI workspace
      # exists only long enough to stage files for the promotion and
      # build the web container.
      - name: Stop native API before promoting to prod dir
        run: |
          # Unload first so ``rsync`` / ``uv sync`` below don't race
          # against the live Python interpreter holding .venv files
          # open. A clean unload is preferable to the crash-loop we
          # hit when files disappear under a running uvicorn.
          launchctl unload -w "$HOME/Library/LaunchAgents/com.autonoma.api.plist" 2>/dev/null || true
          launchctl remove com.autonoma.api 2>/dev/null || true
          # Let launchd actually tear the worker down before rsync
          # starts rewriting prod files.
          sleep 2

      - name: Promote checkout to stable prod directory
        run: |
          PROD_DIR="$HOME/autonoma-prod"
          mkdir -p "$PROD_DIR"
          # Sync everything except:
          #   - .git/  : version-control metadata, server doesn't need it
          #   - .venv/ : rebuilt fresh in the next step so its shebangs
          #              point at the prod dir, not the CI workspace
          # Trailing slash on source makes rsync copy CONTENTS of CWD
          # into prod dir (not a nested autonoma/ subdirectory).
          # --delete mirrors exactly so removed files don't accumulate.
          rsync -aH --delete \
            --exclude='.git/' \
            --exclude='.venv/' \
            ./ "$PROD_DIR/"

      - name: Sync native API dependencies in prod dir
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          # Build prod's own .venv so bin/*/python shebangs are absolute
          # paths into $HOME/autonoma-prod/.venv (survives future CI
          # checkouts that would otherwise strip .venv files).
          # ``--extra tts`` pulls OmniVoice + MPS-capable arm64 torch.
          # ``--extra omnivoice-mlx`` adds the MLX inference path; the
          # mlx-* wheels carry platform markers (macOS arm64 only) so
          # this is a no-op when the runner ever moves off Apple
          # Silicon. Warm uv cache at $HOME/.cache/uv/ makes this
          # 10-30s on repeat deploys; cold first-install is a few
          # minutes.
          cd "$HOME/autonoma-prod"
          uv sync --no-dev --extra tts --extra omnivoice-mlx

      - name: Install/refresh launchd agent for the API
        run: |
          # Call the installer from the prod dir — the script resolves
          # REPO_ROOT via SCRIPT_DIR, so every path in the generated
          # plist (ProgramArguments, WorkingDirectory) anchors on
          # $HOME/autonoma-prod/ instead of the CI workspace. The
          # installer unloads any stale instance (e.g. from an older
          # deploy that still pointed at the CI workspace), rewrites
          # the plist, and loads it. Idempotent across both first
          # install and redeploy.
          bash "$HOME/autonoma-prod/scripts/install_native_api.sh"

      - name: Build and start web container
        run: |
          # Bring web down before up so a rebuild doesn't race on the
          # published port.  --remove-orphans sweeps the old api
          # container from pre-native-migration deploys.
          docker compose down --remove-orphans || true
          docker compose up -d --build web

      - name: Wait for health checks
        run: |
          echo "Waiting for API health (native)…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3479/api/health > /dev/null 2>&1; then
              echo "API is healthy!"
              break
            fi
            sleep 2
          done

          echo "Waiting for Web…"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3478/ > /dev/null 2>&1; then
              echo "Web is healthy!"
              break
            fi
            sleep 2
          done

      - name: Cleanup old images
        run: docker image prune -f

      - name: Deploy summary
        run: |
          echo "### Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- API (native, MPS): http://localhost:3479" >> $GITHUB_STEP_SUMMARY
          echo "- Web (docker): http://localhost:3478" >> $GITHUB_STEP_SUMMARY
          echo "- Web: https://autonoma.letskoala.com" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://api.letskoala.com" >> $GITHUB_STEP_SUMMARY
