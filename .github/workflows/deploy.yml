name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env

      - name: Build and start containers
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d --build

      - name: Wait for health checks
        run: |
          echo "Waiting for API health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3479/api/health > /dev/null 2>&1; then
              echo "API is healthy!"
              break
            fi
            sleep 2
          done

          echo "Waiting for Web..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3478/ > /dev/null 2>&1; then
              echo "Web is healthy!"
              break
            fi
            sleep 2
          done

      - name: Cleanup old images
        run: docker image prune -f

      - name: Deploy summary
        run: |
          echo "### Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- API: http://localhost:3479" >> $GITHUB_STEP_SUMMARY
          echo "- Web: http://localhost:3478" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://autonoma.koala.ai.kr" >> $GITHUB_STEP_SUMMARY
