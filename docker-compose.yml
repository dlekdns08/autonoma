services:
  # ── Python API + WebSocket Server ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3479:8000"
    environment:
      - AUTONOMA_ADMIN_PASSWORD=${AUTONOMA_ADMIN_PASSWORD:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AUTONOMA_PROVIDER=${AUTONOMA_PROVIDER:-anthropic}
      - AUTONOMA_MODEL=${AUTONOMA_MODEL:-claude-sonnet-4-6}
      - AUTONOMA_VLLM_BASE_URL=${AUTONOMA_VLLM_BASE_URL:-}
      - AUTONOMA_VLLM_API_KEY=${AUTONOMA_VLLM_API_KEY:-}
      - AUTONOMA_MAX_ROUNDS=${AUTONOMA_MAX_ROUNDS:-30}
    volumes:
      # Named volume (not a bind mount) so agent-generated files never land
      # in the GitHub Actions runner workspace. A bind mount here causes
      # root-owned files on the host and breaks actions/checkout cleanup.
      - autonoma_output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: wss://autonoma.koala.ai.kr/api/ws
    ports:
      - "3478:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  autonoma_output:
