services:
  # ── Python API + WebSocket Server ──────────────────────────────────
  #
  # Gated behind the ``container`` profile.  Default deploys run the
  # API natively on the Mac host (see scripts/run_api_native.sh) so
  # PyTorch can use MPS for OmniVoice — Docker Desktop on macOS does
  # not pass Metal through to containers.  To fall back to the
  # containerised API (e.g. on a Linux host) use:
  #     docker compose --profile container up -d
  api:
    profiles: ["container"]
    build:
      context: .
      dockerfile: Dockerfile.api
      # Build args let the operator pin or skip the ASR model without
      # editing the Dockerfile (e.g. ``ASR_MODEL_ID=''`` to skip the
      # gated download entirely).
      args:
        ASR_MODEL_ID: ${ASR_MODEL_ID-CohereLabs/cohere-transcribe-03-2026}
        OMNIVOICE_MODEL_ID: ${OMNIVOICE_MODEL_ID-k2-fsa/OmniVoice}
      # Build secret wired into the ASR pre-download step. The token is
      # never written into an image layer — BuildKit mounts it as a
      # tmpfs file under ``/run/secrets/hf_token`` for the duration of
      # the RUN step only. See the top-level ``secrets:`` block below.
      secrets:
        - hf_token
    ports:
      - "3479:8000"
    environment:
      - AUTONOMA_ADMIN_PASSWORD=${AUTONOMA_ADMIN_PASSWORD:-}
      - AUTONOMA_SESSION_SECRET=${AUTONOMA_SESSION_SECRET:-}
      - AUTONOMA_CORS_ALLOW_ORIGINS=${AUTONOMA_CORS_ALLOW_ORIGINS:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AUTONOMA_PROVIDER=${AUTONOMA_PROVIDER:-anthropic}
      - AUTONOMA_MODEL=${AUTONOMA_MODEL:-claude-sonnet-4-6}
      - AUTONOMA_VLLM_BASE_URL=${AUTONOMA_VLLM_BASE_URL:-}
      - AUTONOMA_VLLM_API_KEY=${AUTONOMA_VLLM_API_KEY:-}
      - AUTONOMA_MAX_ROUNDS=${AUTONOMA_MAX_ROUNDS:-30}
      # TTS (OmniVoice): on by default in prod so the warmup hook in
      # lifespan() loads the multi-GB model at boot. First-utterance
      # latency otherwise spikes to 30–60s on CPU.
      - AUTONOMA_TTS_ENABLED=${AUTONOMA_TTS_ENABLED:-true}
      - AUTONOMA_TTS_PROVIDER=${AUTONOMA_TTS_PROVIDER:-omnivoice}
      # ASR (Cohere): when the model was pre-downloaded at build time
      # the cache under HF_HOME satisfies all reads and HF_TOKEN is not
      # needed at runtime. We still forward it so any unrelated HF call
      # (e.g. swapping to a different ASR model post-deploy) still
      # authenticates.
      - AUTONOMA_VOICE_ASR_PROVIDER=${AUTONOMA_VOICE_ASR_PROVIDER:-cohere}
      - AUTONOMA_VOICE_ASR_DEFAULT_LANGUAGE=${AUTONOMA_VOICE_ASR_DEFAULT_LANGUAGE:-ko}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      # Named volume (not a bind mount) so agent-generated files never land
      # in the GitHub Actions runner workspace. A bind mount here causes
      # root-owned files on the host and breaks actions/checkout cleanup.
      - autonoma_output:/app/output
      # Persist the SQLite database (users, harness presets, characters) across
      # container restarts. Without this, all auth data is lost on every restart.
      - autonoma_db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ───────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.letskoala.com/api/ws}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.letskoala.com}
    ports:
      - "3478:3000"
    # No ``depends_on: api``: in the default (native-api) deploy mode
    # the API lives outside the compose project entirely.  The web
    # frontend only talks to the API via its public Cloudflare URL
    # (baked into NEXT_PUBLIC_API_URL at build time), so it never
    # needs the api service on the compose network.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  autonoma_output:
  autonoma_db:

# BuildKit secrets used by the api stage.
#
# Two ways to provide the token, pick whichever fits your workflow:
#
#  1. File on disk (recommended for local builds):
#       echo "hf_xxx" > .secrets/hf_token
#       export HF_TOKEN_FILE=$(pwd)/.secrets/hf_token
#       docker compose --profile container build api
#
#  2. From the HF_TOKEN env var (CI / one-off):
#       export HF_TOKEN=hf_xxx
#       printf "%s" "$HF_TOKEN" > /tmp/hf_token
#       export HF_TOKEN_FILE=/tmp/hf_token
#       docker compose --profile container build api
#
# Skip ASR download instead of providing a token:
#       ASR_MODEL_ID="" docker compose --profile container build api
secrets:
  hf_token:
    file: ${HF_TOKEN_FILE:-/dev/null}
